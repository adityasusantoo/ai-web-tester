<!DOCTYPE html>
<html lang="en">
<head>
    <meta charSet="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/_next/static/css/5b32a90a1f88bf1b.css" data-precedence="next" />
    <title>SAKEN GEAL-GEOL | AI Motion Control</title>
    <meta name="description" content="Premium AI Motion Control Video Generator" />
</head>
<body class="selection:bg-blue-100">
    <main class="min-h-screen bg-gradient-to-br from-[#EAF6FF] to-[#D8EEFF] text-[#0F172A] py-12 px-4 font-sans">
        <div class="max-w-3xl mx-auto space-y-8">
            
            <!-- Header Section -->
            <header class="card p-10 text-center border border-white/60 shadow-2xl shadow-blue-200/40 relative overflow-hidden group">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-300 via-blue-500 to-blue-300"></div>
                <h1 class="text-5xl font-black tracking-tighter text-[#1E3A8A] mb-3 drop-shadow-sm transition-transform duration-500 group-hover:scale-105">
                    SAKEN GEAL-GEOL
                </h1>
                <p class="text-sm font-medium text-[#475569] tracking-wide">
                    The Next-Gen Motion Control Generator by 
                    <span class="text-[#2563EB] font-extrabold px-2 py-0.5 bg-blue-50 rounded-lg">SAKURA</span>
                </p>
                <div class="mt-6">
                    <a href="https://www.facebook.com/S4QR4" target="_blank" class="text-xs font-semibold text-[#3B82F6] hover:text-[#1E3A8A] bg-white/50 px-4 py-2 rounded-full border border-blue-100 transition-all hover:shadow-md">
                        Follow FB: facebook.com/S4QR4
                    </a>
                </div>
            </header>

            <!-- API Key Section -->
            <section class="card p-6 space-y-4 shadow-xl shadow-blue-200/20 border border-white/80">
                <div class="flex justify-between items-center px-1">
                    <label class="text-xs font-bold text-[#1E3A8A] uppercase tracking-widest">Authentication</label>
                    <span class="text-[10px] font-semibold text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md">Secure Connection</span>
                </div>
                <input type="password" placeholder="Enter your Magnific / Freepik API key..." 
                    class="w-full bg-white/80 backdrop-blur-md border border-[#B7DFFF] focus:border-[#3B82F6] focus:ring-4 focus:ring-blue-500/10 rounded-2xl px-5 py-4 text-sm outline-none transition-all duration-300 shadow-inner placeholder:text-blue-300" />
            </section>

            <!-- Upload Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Reference Image -->
                <div class="card p-6 space-y-4 shadow-xl border border-white/80 hover:scale-[1.02] transition-transform duration-300">
                    <span class="text-xs font-bold text-[#1E3A8A] uppercase tracking-widest px-1">Reference Image</span>
                    <div class="relative group cursor-pointer rounded-2xl border-2 border-dashed border-[#93C5FD] hover:border-[#3B82F6] hover:bg-blue-50/50 transition-all duration-300 bg-white/40 flex flex-col items-center justify-center py-10 gap-3">
                        <div class="p-3 bg-blue-100 rounded-2xl text-blue-600 group-hover:bg-blue-500 group-hover:text-white transition-colors duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        </div>
                        <p class="text-xs font-bold text-[#475569]">Drop JPG, PNG, or WebP</p>
                    </div>
                </div>

                <!-- Reference Video -->
                <div class="card p-6 space-y-4 shadow-xl border border-white/80 hover:scale-[1.02] transition-transform duration-300">
                    <span class="text-xs font-bold text-[#1E3A8A] uppercase tracking-widest px-1">Motion Video</span>
                    <div class="relative group cursor-pointer rounded-2xl border-2 border-dashed border-[#93C5FD] hover:border-[#3B82F6] hover:bg-blue-50/50 transition-all duration-300 bg-white/40 flex flex-col items-center justify-center py-10 gap-3">
                        <div class="p-3 bg-blue-100 rounded-2xl text-blue-600 group-hover:bg-blue-500 group-hover:text-white transition-colors duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                        </div>
                        <p class="text-xs font-bold text-[#475569]">Drop MP4 or MOV</p>
                    </div>
                </div>
            </div>

            <!-- Settings Card -->
            <div class="card p-8 space-y-6 shadow-xl border border-white/80">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-[#1E3A8A] uppercase tracking-widest">Engine Model</label>
                        <select class="w-full bg-white/80 border border-[#B7DFFF] focus:border-[#3B82F6] rounded-xl px-4 py-3 text-sm outline-none cursor-pointer hover:bg-white transition-colors">
                            <option>Kling 2.6 Standard</option>
                            <option>Kling 2.6 Pro</option>
                            <option>Kling 3 Standard</option>
                            <option>Kling 3 Pro</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-baseline">
                            <label class="text-xs font-bold text-[#1E3A8A] uppercase tracking-widest">CFG Scale</label>
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 rounded">0.50</span>
                        </div>
                        <input type="range" min="0" max="1" step="0.01" class="w-full h-1.5 bg-blue-100 rounded-full appearance-none accent-blue-500" value="0.5" />
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-[#1E3A8A] uppercase tracking-widest">Creative Prompt</label>
                    <textarea placeholder="Describe the motion details (optional)..." rows="3" 
                        class="w-full bg-white/80 border border-[#B7DFFF] focus:border-[#3B82F6] rounded-2xl px-4 py-3 text-sm outline-none resize-none transition-all placeholder:text-blue-300"></textarea>
                </div>
            </div>

            <!-- Action Button -->
            <button class="w-full py-5 rounded-2xl font-black text-white text-lg tracking-widest transition-all duration-500 bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:to-blue-800 hover:scale-[1.01] hover:shadow-2xl hover:shadow-blue-400/40 transform active:scale-95 shadow-lg shadow-blue-500/30">
                GENERATE MAGIC
            </button>
            
            <footer class="text-center py-6 opacity-60">
                <p class="text-[10px] font-bold text-blue-900 uppercase tracking-[0.2em]">© 2026 SAKURA DIGITAL LABS</p>
            </footer>
        </div>
    </main>
</body>
</html>
